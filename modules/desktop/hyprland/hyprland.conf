
################
# MONITOR
################
monitor=,preferred,auto,1

################
# STARTUP
################
exec-once = hyprpaper &
exec-once = waybar &
exec-once = nm-applet &
exec-once = dunst &

################
# ENV VARS
################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

################
# INPUT
################
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

################
# GENERAL
################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Catppuccin Mocha Colors
    col.active_border = rgb(cba6f7) rgb(94e2d5) 45deg
    col.inactive_border = rgb(585b70)

    layout = dwindle

    allow_tearing = false
}

################
# DECORATION
################
decoration {
    # SHARP CORNERS (User Request)
    rounding = 0
    
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 1
    }

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }
}

################
# ANIMATIONS
################
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

################
# LAYOUTS
################
dwindle {
    pseudotile = yes 
    preserve_split = yes 
}

master {
    new_status = master
}

################
# WINDOW RULES
################
windowrulev2 = suppressevent maximize, class:.* 

################
# KEYBINDINGS
################
$mod = SUPER

# Application shortcuts
bind = $mod, RETURN, exec, kitty
bind = $mod, D, exec, wofi --show drun
bind = $mod, E, exec, thunar
bind = $mod, B, exec, brave
bind = $mod, T, exec, kitty -e btop
bind = $mod, M, exec, spotify
bind = $mod, N, exec, antigravity
bind = $mod, PRINT, exec, hyprshot -m region
bind = $mod, L, exec, hyprlock
bind = $mod, H, exec, keyshelf

# Window Management
bind = $mod, W, killactive, # User requested W for closing
bind = $mod, Q, exit, 
bind = $mod, V, togglefloating, 
bind = $mod, P, pseudo, # dwindle
bind = $mod, J, togglesplit, # dwindle
bind = $mod, F, fullscreen, 

# Tabs (Group)
bind = $mod, G, togglegroup
bind = $mod, Tab, changegroupactive

# Scratchpad (Special Workspace)
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic

# Move window with mod + SHIFT + arrow keys
bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

# Resize window with mod + CTRL + arrow keys
bind = $mod CTRL, left, resizeactive, -20 0
bind = $mod CTRL, right, resizeactive, 20 0
bind = $mod CTRL, up, resizeactive, 0 -20
bind = $mod CTRL, down, resizeactive, 0 20

# Move focus with mod + arrow keys
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Switch workspaces with mod + [0-9]
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Move active window to a workspace with mod + SHIFT + [0-9]
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mod + scroll
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# Move/resize windows with mod + LMB/RMB and dragging
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Volume (Using wpctl for Pipewire)
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# Brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
